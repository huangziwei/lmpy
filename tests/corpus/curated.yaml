meta:
  generated_by: hand-authored
  kind: curated
  purpose: >
    Targeted cases for feature values that don't show up in any R help file
    formula — contrasts, intercept variants, subtract-edges, transforms,
    uncommon RE patterns, mgcv edge modifiers. Each case is paired with a
    dataset we actually export under datasets/<pkg>/.
